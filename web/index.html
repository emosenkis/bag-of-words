<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Word Deck</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main>
      <h1>Word Deck</h1>
      <p>Generate a deterministic, printable story-word deck entirely in your browser.</p>
      <form id="generator">
        <label>Corpus <select name="corpus"><option value="asimov">Asimov magazine OCR</option><option value="fiction-xlsx">Fiction frequency dataset</option></select></label>
        <label>Word cards <input name="count" type="number" min="100" value="2800"></label>
        <label>Palette types <input name="paletteSize" type="number" min="50" value="700"></label>
        <label>Required common words <input name="requiredHead" type="number" min="0" value="200"></label>
        <label>Seed <input name="seed" type="number" value="20260717"></label>
        <label>Font size <input name="fontSize" type="number" min="6" max="36" step="0.5" value="14"></label>
        <label>Paper <select name="paperSize"><option value="letter">Letter</option><option value="a3">A3</option><option value="a4" selected>A4</option><option value="a5">A5</option></select></label>
        <label>Orientation <select name="orientation"><option value="portrait">Portrait</option><option value="landscape">Landscape</option></select></label>
        <label>Export <select name="format"><option value="pdf">PDF via Typst</option><option value="html">Printable HTML</option><option value="typst">Typst source</option><option value="txt">Plain text</option></select></label>
        <div class="actions">
          <button id="generate" type="submit">Generate</button>
          <button id="download" type="button" disabled>Download</button>
        </div>
      </form>
      <output id="status" aria-live="polite">Loading word-deck WASM…</output>
      <iframe id="result" title="Generated word deck" hidden></iframe>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
